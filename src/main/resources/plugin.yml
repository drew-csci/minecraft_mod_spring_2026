name: WorldSettingsPlugin
version: 1.0.0
main: com.example.worldsettings.WorldSettingsPlugin
api-version: "1.20"
description: Customizable world settings with an in-game GUI menu
author: Developer
commands:
  worldsettings:
    description: Opens the World Settings GUI
    usage: /worldsettings
    permission: worldsettings.use
  supertableinfo:
    description: Shows Super Enchantment Table information
    usage: /supertableinfo
    permission: worldsettings.supertable.info
permissions:
  worldsettings.use:
    description: Allows opening the world settings menu
    default: op
  worldsettings.supertable.info:
    description: Allows viewing super enchantment table information
    default: true
