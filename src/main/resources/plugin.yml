name: WorldSettingsPlugin
version: 1.0.0
main: com.example.worldsettings.WorldSettingsPlugin
api-version: "1.20"
description: Customizable world settings with an in-game GUI menu
author: Developer

commands:
  worldsettings:
    description: Opens the World Settings GUI
    usage: /worldsettings
    permission: worldsettings.use

  spawnhellzombie:
    description: Spawns a Hell Zombie at your location
    usage: /spawnhellzombie
    permission: worldsettings.use

  spawnhellcreeper:
    description: Spawns a Hell Creeper at your location
    usage: /spawnhellcreeper
    permission: worldsettings.use

permissions:
  worldsettings.use:
    description: Allows opening the world settings menu and spawning zombies/creepers
    default: op