name: WorldSettingsPlugin
version: 1.0.0
main: com.example.worldsettings.WorldSettingsPlugin
api-version: "1.20"
description: Customizable world settings with an in-game GUI menu
author: Developer

commands:
  worldsettings:
    description: Opens the World Settings GUI or manages world phases
    usage: /worldsettings [reload|postend <start|stop>|crimsondescent <start|stop>|stopall]
    permission: worldsettings.use

  progression:
    description: Shows the player's progression score
    usage: /progression
    permission: worldsettings.use

  supertableinfo:
    description: Shows Super Enchantment Table information
    usage: /supertableinfo
    permission: worldsettings.supertable.info

permissions:
  worldsettings.use:
    description: Allows opening the world settings menu
    default: op
  worldsettings.reload:
    description: Allows reloading world settings config
    default: op
  worldsettings.supertable.info:
    description: Allows viewing super enchantment table information
    default: true
