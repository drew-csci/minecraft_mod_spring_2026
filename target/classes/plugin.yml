name: WorldSettingsPlugin
version: 1.0.0
main: com.example.worldsettings.WorldSettingsPlugin
api-version: "1.20"
description: Customizable world settings with an in-game GUI menu
author: Developer
commands:
  worldsettings:
    description: Opens the World Settings GUI
    usage: /worldsettings
    permission: worldsettings.use
  superenchant:
    description: Opens the Super Enchantment Table when holding it
    usage: /superenchant
    permission: worldsettings.superenchant.use
  supertable:
    description: Gives a Super Enchantment Table to the player
    usage: /supertable
    permission: worldsettings.superenchant.give
permissions:
  worldsettings.use:
    description: Allows opening the world settings menu
    default: op
  worldsettings.superenchant.use:
    description: Allows using the Super Enchantment Table
    default: true
  worldsettings.superenchant.give:
    description: Allows giving the Super Enchantment Table
    default: op
